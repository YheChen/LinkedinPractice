name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from the "packageManager" field in package.json (pnpm@10);
      # do NOT also pass `version` here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: playwright e2e (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from the "packageManager" field in package.json (pnpm@10);
      # do NOT also pass `version` here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test --project=chromium-desktop
